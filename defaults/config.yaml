# Cambium configuration
queue:
  adapter: sqlite
  database: data/cambium.db

self_improvement:
  # How to handle upstream framework updates:
  #   manual  — no automatic upstream interaction (default)
  #   notify  — flag when upstream has new commits
  #   auto    — generate tailored merge PRs for upstream changes
  upstream_policy: manual

  # Hard cap on open self-improvement PRs (prevents PR flooding)
  max_pending_improvement_prs: 3

  # Enable contributing merged self-improvements back to upstream framework
  contribute_upstream: false

  # Determines how upstream PRs are created:
  #   author       — has push access to upstream repo (creates branch directly)
  #   contributor  — no push access (forks and PRs from fork)
  upstream_role: contributor

  # Set automatically on first contribution (fork URL for contributors)
  fork_remote: null
