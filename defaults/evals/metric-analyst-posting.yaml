# Eval: Metric analyst posts readings when dispatched
#
# Tests that the metric-analyst routine receives a metric_collect message,
# reads context (constitution, work items), and posts a reading via the
# metrics API for the goal_progress_estimate metric.
#
# Seed: constitution with clear goals for the analyst to assess
# Trigger: metric_collect message targeting metric-analyst-heavy
# Assert: episode completes, reading posted with value in 0-1 range
#
# Cost: ~$0.10 per trial (sonnet overridden to haiku for eval)
name: metric-analyst-posting
trials: 1
timeout: 120

config_override:
  adapters/claude-code/instances/metric-analyst-heavy.yaml:
    config:
      model: haiku

scenarios:
  - name: analyst-posts-goal-progress-reading
    seed_data:
      - path: constitution.md
        content: |
          # My Constitution
          ## Goals
          1. Build effective AI agent systems
          2. Maintain physical and mental health
          3. Contribute to AI safety research

    inject:
      - channel: metric_collect
        payload:
          target: metric-analyst-heavy
          metrics:
            - goal_progress_estimate

    wait:
      routine_completed: metric-analyst-heavy

    assertions:
      - type: episode
        routine: metric-analyst-heavy
        status: completed
      - type: deterministic
        path: defaults/evals/scripts/check-metric-reading-posted.sh
        threshold: 0.5
      - type: no_errors
