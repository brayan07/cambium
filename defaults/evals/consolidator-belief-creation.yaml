# Eval: Memory consolidator creates preference belief files from digest signals.
#
# Strategy: Run a cascade to generate sessions with preference signals, wait for
# the summarizer to write digests, then trigger a consolidator scan via heartbeat.
# Wait for the consolidator to complete, then check for preference belief files.
#
# The heartbeat injection has a delay to let the cascade + summarizer run first.
# We wait for routine_completed: memory-consolidator (not cascade_settled).
#
# Cost: ~$1-2 per trial
name: consolidator-belief-creation
trials: 3
timeout: 600

config_override:
  adapters/claude-code/instances/coordinator.yaml:
    config:
      model: sonnet
  adapters/claude-code/instances/planner.yaml:
    config:
      model: sonnet
  adapters/claude-code/instances/executor.yaml:
    config:
      model: sonnet
  adapters/claude-code/instances/reviewer.yaml:
    config:
      model: sonnet
  adapters/claude-code/instances/session-summarizer.yaml:
    config:
      model: sonnet
  adapters/claude-code/instances/sentry.yaml:
    config:
      model: sonnet
  adapters/claude-code/instances/memory-consolidator.yaml:
    config:
      model: sonnet

scenarios:
  - name: full-pipeline-preference-to-belief
    inject:
      - channel: external_events
        payload:
          goal: >
            User said: 'I always want research output as a structured markdown
            document with sections for findings, confidence levels, and open
            questions. Never give me a wall of text.' Research best practices
            for API rate limiting.
      # Trigger consolidator scan after a delay to let the cascade + summarizer run
      - channel: heartbeat
        payload:
          window: scan
          target: memory-consolidator
        delay: 90
    wait:
      routine_completed: memory-consolidator
    assertions:
      - type: episode
        routine: coordinator
        status: completed
      - type: episode
        routine: session-summarizer
        status: completed
      - type: episode
        routine: memory-consolidator
        status: completed
      - type: memory_committed
      - type: deterministic
        path: defaults/evals/scripts/check-preference-beliefs.sh
        threshold: 0.5
      - type: no_errors
